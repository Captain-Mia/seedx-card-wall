<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeedX共创名片墙</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="site-header">
        <div class="hero-copy">
          <h1>SeedX共创名片墙</h1>
          <p class="subtitle">让种子落地，让想法发芽</p>
        </div>
      </header>

      <section class="tab-shell" aria-label="内容切换">
        <div class="tabs">
          <button class="tab-button is-active" type="button" data-tab="people">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            人物图鉴
            <span class="badge" id="peopleBadge">0</span>
          </button>
          <button class="tab-button" type="button" data-tab="projects">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" />
            </svg>
            共创项目
            <span class="badge" id="projectsBadge">0</span>
          </button>
        </div>
      </section>

      <section id="peoplePanel" class="panel is-active" aria-label="人物图鉴">
        <div class="people-tools">
          <label class="search-box" for="peopleSearch">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input id="peopleSearch" type="search" placeholder="搜索姓名、城市、技能、方向、想链接..." autocomplete="off" />
          </label>
        </div>
        <p class="empty-state" id="peopleEmpty" hidden>没有找到匹配的伙伴</p>
        <div class="card-grid" id="peopleGrid"></div>
      </section>

      <section id="projectsPanel" class="panel" aria-label="共创项目">
        <div class="card-grid" id="projectsGrid"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
